substitutions:
  device_name: esp-rozdzielnia
  friendly_name: esp32-rozdzielnia
  device_description: "Sterownik oświetlenia w domu"

esphome:
  name: esp32-rozdzielnia
  includes:
    - expander_globals.h

esp8266:
  board: d1_mini

i2c:
  sda: 4
  scl: 5
  scan: True
  id: i2c_component

external_components:
  - source:
      type: git
      url: https://github.com/robertklep/esphome-custom-component
    components: [ custom, custom_component ]

# Lambda custom_component uruchamia sie w setup() przed output i binary_sensor.
# Ustawiamy global_expander tutaj - bedzie gotowy zanim lambdy output/sensor go uzyja.
custom_component:
  - id: expander1
    lambda: |-
      auto *expander = new ArduinoPortExpander(i2c_component, 0x08, true);
      global_expander = expander;
      App.register_component_(expander);
      return {expander};

web_server:
  port: 80

wifi:
  ssid: NETGEAR07
  password: festivecomet442
  min_auth_mode: WPA2

  manual_ip:
    static_ip: 192.168.18.10
    gateway: 192.168.18.1
    subnet: 255.255.255.0

  ap:
    ssid: "Esp32-Rozdzielnia"
    password: "drpol2409b"

logger:
  level: INFO

api:

ota:
  platform: esphome

captive_portal:

text_sensor:
  - platform: template
    name: uptime ${device_name}
    id: uptime_human
    icon: mdi:clock-start

sensor:
  - platform: uptime
    name: Uptime Sensor
    id: uptime_sensor
    update_interval: 60s
    on_raw_value:
      then:
        - text_sensor.template.publish:
            id: uptime_human
            state: !lambda |-
              int seconds = round(id(uptime_sensor).get_raw_state());
              int days = seconds / (24 * 3600);
              seconds = seconds % (24 * 3600);
              int hours = seconds / 3600;
              seconds = seconds % 3600;
              int minutes = seconds / 60;
              seconds = seconds % 60;
              return (
                (days ? to_string(days) + "d " : "") +
                (hours ? to_string(hours) + "h " : "") +
                (minutes ? to_string(minutes) + "m " : "") +
                (to_string(seconds) + "s")
              ).c_str();

switch:
  - platform: restart
    name: "Restart esp32-rozdzielnia"

# global_expander jest ustawiony przez custom_component przed uruchomieniem tych lambd
output:
